name: CI - Quality Check

on:
  push:
    branches: [main, dev, "feat/**"]
  pull_request:
    branches: [main, dev]

jobs:
  test-and-lint:
    name: Lint & Build Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./popup-abencoado

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: ./popup-abencoado/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build Test (static export)
        run: npm run build
        env:
          NEXT_PUBLIC_URL: "https://placeholder.com"
          NEXT_PUBLIC_SUPABASE_URL: "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}"