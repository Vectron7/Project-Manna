name: CD

on:
  push:
    branches: [main, dev, feat/production-github-pages]

jobs:
  check-deploy-readiness:
    name: Check Deploy Readiness
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: popup-abencoado/package-lock.json

      - name: Install dependencies
        working-directory: popup-abencoado
        run: npm ci

      - name: Production Build
        working-directory: popup-abencoado
        run: npm run build
        env:
          # Use as mesmas variáveis do CI
          DATABASE_URL: "postgresql://johndoe:randompassword@localhost:5432/mydb?schema=public"
          NEXT_PUBLIC_URL: "https://vectron7.github.io/Project-Manna"

      - name: Success Message
        run: |
          echo "✅ Build de produção concluído com sucesso!"
          echo "Os arquivos estáticos foram gerados. Se você usou distDir: '../docs', sua pasta docs na raiz foi atualizada."