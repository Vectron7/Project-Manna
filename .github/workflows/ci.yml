name: CI - Quality Check

on:
  push:
    branches: [main, dev, "feat/**"]
  pull_request:
    branches: [main, dev]

jobs:
  test-and-lint:
    name: Lint & Build Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./popup-abencoado

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: ./popup-abencoado/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./popup-abencoado

      - name: Lint
        run: npm run lint
        working-directory: ./popup-abencoado

      - name: Build Test
        run: npm run build
        working-directory: ./popup-abencoado
        env:
          NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "placeholder"