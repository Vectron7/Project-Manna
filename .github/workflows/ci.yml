name: CI - Quality Check

on:
  push:
    branches: [main, dev, "feat/**"]
  pull_request:
    branches: [main, dev]

jobs:
  test-and-lint:
    name: Lint & Build Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./popup-abencoado

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: popup-abencoado/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build Test
        run: npm run build
        env:
          NEXT_PUBLIC_URL: "https://vectron7.github.io/Project-Manna"
          DATABASE_URL: "postgresql://johndoe:random@localhost:5432/mydb"